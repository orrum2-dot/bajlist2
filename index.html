<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bajlist</title>

  <!-- Fonts: Space Grotesk (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:   "#0C0E12", // page background
            panel: "#12151B", // cards
            line:  "rgba(255,255,255,0.08)",
            body:  "#EDEFF3",
            muted: "#98A1AD",
            amber: "#E3B04B", // projector-light accent
          },
          fontFamily: {
            display: ['"Space Grotesk"', "sans-serif"],
            sans: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>

  <style>
    [hidden] { display: none !important; }

    /* Film-strip perforation as the signature divider */
    .sprockets {
      height: 14px;
      background-image: radial-gradient(
        rgba(255, 255, 255, 0.14) 2.5px,
        transparent 2.6px
      );
      background-size: 26px 14px;
      background-position: center;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .poster-card img { transition: transform 0.45s cubic-bezier(0.2, 0.6, 0.2, 1); }
    .poster-card:hover img { transform: scale(1.05); }
    .poster-card .overlay { opacity: 0; transition: opacity 0.3s ease; }
    .poster-card:hover .overlay,
    .poster-card:focus-visible .overlay { opacity: 1; }

    .skeleton {
      background: linear-gradient(100deg, #12151B 40%, #1A1E26 50%, #12151B 60%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite linear;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    @media (prefers-reduced-motion: reduce) {
      .poster-card img, .poster-card .overlay { transition: none; }
      .skeleton { animation: none; }
    }

    :focus-visible { outline: 2px solid #E3B04B; outline-offset: 3px; }
  </style>
</head>

<body class="bg-ink font-sans text-body antialiased min-h-screen">

  <!-- ===== Header ===== -->
  <header class="mx-auto max-w-6xl px-5 pt-14 pb-10 sm:pt-20">
    <h1 class="font-display text-4xl font-bold tracking-tight sm:text-5xl">
      Welcome Bajs
    </h1>
  </header>

  <div class="sprockets" aria-hidden="true"></div>

  <main class="mx-auto max-w-6xl px-5 pb-24">

    <!-- Demo-mode banner (hidden by default, shown when the API isn't reachable) -->
    <div id="demo-banner" hidden
         class="mt-10 flex items-start gap-3 rounded-md border border-amber/40 bg-amber/10 px-4 py-3 text-sm">
      <span aria-hidden="true">🎞️</span>
      <p>
        <strong class="font-semibold">Demo mode.</strong>
        <span class="text-muted">
          The API isn't reachable here, so you're looking at sample data.
          Live data appears once the app is deployed on Vercel with its
          environment variables set.
        </span>
      </p>
    </div>

    <!-- ===== Section 1: History ===== -->
    <section aria-labelledby="watched-heading" class="pt-14">
      <div class="flex items-baseline justify-between border-b border-line pb-4">
        <h2 id="watched-heading"
            class="font-display text-lg font-semibold tracking-wide">
          Recently watched
        </h2>
        <span id="watched-count" class="text-xs text-muted"></span>
      </div>
      <div id="watched-grid"
           class="mt-8 grid grid-cols-2 gap-x-4 gap-y-8 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6">
        <!-- filled by JS -->
      </div>
      <p id="watched-status" class="mt-6 text-sm text-muted" hidden></p>
    </section>

    <!-- ===== Section: Watchlist ===== -->
    <section aria-labelledby="watchlist-heading" class="pt-20">
      <div class="flex items-baseline justify-between border-b border-line pb-4">
        <h2 id="watchlist-heading"
            class="font-display text-lg font-semibold tracking-wide">
          Watchlist
        </h2>
        <span id="watchlist-count" class="text-xs text-muted"></span>
      </div>
      <div id="watchlist-grid"
           class="mt-8 grid grid-cols-2 gap-x-4 gap-y-8 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6">
        <!-- filled by JS -->
      </div>
      <p id="watchlist-status" class="mt-6 text-sm text-muted" hidden></p>
    </section>

    <!-- ===== Section 2: Wishlist ===== -->
    <section aria-labelledby="wishes-heading" class="pt-20" hidden>
      <div class="flex items-baseline justify-between border-b border-line pb-4">
        <h2 id="wishes-heading"
            class="font-display text-lg font-semibold tracking-wide">
          Community wishlist
        </h2>
        <span class="text-xs text-muted">via points store · "Movie Wish"</span>
      </div>
      <div id="wishes-list"
           class="mt-8 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <!-- filled by JS -->
      </div>
      <p id="wishes-status" class="mt-6 text-sm text-muted" hidden></p>
    </section>
  </main>

  <!-- ===== Movie detail modal ===== -->
  <div id="movie-modal" hidden class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-8">
    <div class="absolute inset-0 bg-black/75 backdrop-blur-sm" data-close></div>
    <div class="relative w-full max-w-2xl overflow-hidden rounded-lg border border-line bg-panel shadow-2xl"
         role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button data-close aria-label="Close"
              class="absolute right-3 top-3 z-10 flex h-8 w-8 items-center justify-center rounded-full border border-line bg-ink/80 text-muted transition-colors hover:text-body">
        ✕
      </button>
      <div class="flex max-h-[85vh] flex-col overflow-y-auto sm:flex-row sm:overflow-visible">
        <div id="modal-poster" class="shrink-0 sm:w-56"></div>
        <div class="min-w-0 p-6 sm:p-7">
          <h3 id="modal-title" class="font-display text-2xl font-bold tracking-tight pr-8"></h3>
          <p id="modal-meta" class="mt-2 text-sm text-muted"></p>
          <p id="modal-genres" class="mt-2 font-display text-[11px] font-medium uppercase tracking-[0.2em] text-amber"></p>
          <p id="modal-overview" class="mt-4 text-sm leading-relaxed text-body/90"></p>
          <p id="modal-added" class="mt-5 border-t border-line pt-4 text-xs text-muted"></p>
        </div>
      </div>
    </div>
  </div>

  <footer class="border-t border-line">
    <div class="mx-auto max-w-6xl px-5 py-6 text-xs text-muted">
      <span>Movie data &amp; posters by <a class="underline decoration-line underline-offset-4 hover:text-body" href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a></span>
    </div>
  </footer>

  <script>
    // ---------- Demo data (shown only when the API isn't reachable) ----------
    const DEMO_MOVIES = [
      { title: "Blade Runner 2049", year: "2017", genres: ["Sci-Fi", "Drama"], poster: null, rating: 7.6, runtime: 164, overview: "A young blade runner uncovers a long-buried secret that leads him to track down former blade runner Rick Deckard." },
      { title: "Whiplash", year: "2014", genres: ["Drama", "Music"], poster: null, rating: 8.4, runtime: 107, overview: "A promising young drummer enrolls at a cut-throat music conservatory where an abusive instructor pushes him to his limits." },
      { title: "Spirited Away", year: "2001", genres: ["Animation", "Fantasy"], poster: null, rating: 8.5, runtime: 125, overview: "A young girl wanders into a world ruled by gods and witches, where humans are changed into beasts." },
      { title: "Mad Max: Fury Road", year: "2015", genres: ["Action"], poster: null, rating: 7.6, runtime: 121, overview: "In a post-apocalyptic wasteland, Max teams up with Furiosa to flee from a tyrant and his army in an armored tanker truck." },
      { title: "Parasite", year: "2019", genres: ["Thriller", "Drama"], poster: null, rating: 8.5, runtime: 133, overview: "A poor family schemes to become employed by a wealthy household by infiltrating their domestic life." },
      { title: "The Grand Budapest Hotel", year: "2014", genres: ["Comedy"], poster: null, rating: 8.0, runtime: 100, overview: "A legendary concierge and his protégé become entangled in the theft of a priceless painting between the wars." },
    ];
    const DEMO_WATCHLIST = [
      { title: "Dune: Part Two", year: "2024", genres: ["Sci-Fi", "Adventure"], poster: null, rating: 8.2, runtime: 167, overview: "Paul Atreides unites with Chani and the Fremen while seeking revenge against the conspirators who destroyed his family." },
      { title: "Oldboy", year: "2003", genres: ["Thriller", "Mystery"], poster: null, rating: 8.3, runtime: 120, overview: "After being imprisoned for fifteen years without explanation, a man is released and seeks the truth behind his captivity." },
      { title: "Everything Everywhere All at Once", year: "2022", genres: ["Adventure", "Comedy"], poster: null, rating: 7.8, runtime: 139, overview: "An aging Chinese immigrant is swept up in an insane adventure where she alone can save the multiverse." },
    ];

    // ---------- Helpers ----------
    const $ = (sel) => document.querySelector(sel);

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text) node.textContent = text;
      return node;
    }

    function posterOrPlaceholder(movie, imgClasses) {
      if (movie.poster) {
        const img = el("img", imgClasses);
        img.src = movie.poster;
        img.alt = `Movie poster: ${movie.title}`;
        img.loading = "lazy";
        return img;
      }
      // Placeholder in case TMDB has no poster (or in demo mode)
      const ph = el(
        "div",
        imgClasses +
          " flex items-center justify-center bg-panel text-center text-xs text-muted p-3"
      );
      ph.textContent = movie.title;
      return ph;
    }

    // ---------- Poster grids (Recently watched + Watchlist) ----------
    function renderMovieGrid(movies, gridSel, countSel, statusSel, emptyMsg, dateLabel) {
      const grid = $(gridSel);
      grid.innerHTML = "";
      $(countSel).textContent = movies.length ? `${movies.length} movies` : "";

      if (!movies.length) {
        showStatus(statusSel, emptyMsg);
        return;
      }
      $(statusSel).hidden = true;

      for (const m of movies) {
        m._dateLabel = dateLabel;
        const card = el(
          "article",
          "poster-card group relative cursor-pointer overflow-hidden rounded-md border border-line bg-panel"
        );
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", `Show details: ${m.title}`);
        card.addEventListener("click", () => openModal(m));
        card.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter" || ev.key === " ") {
            ev.preventDefault();
            openModal(m);
          }
        });

        const frame = el("div", "aspect-[2/3] overflow-hidden");
        frame.appendChild(
          posterOrPlaceholder(m, "h-full w-full object-cover")
        );
        card.appendChild(frame);

        // Hover overlay with year & genre
        const overlay = el(
          "div",
          "overlay absolute inset-0 flex flex-col justify-end bg-gradient-to-t from-black/85 via-black/30 to-transparent p-3"
        );
        overlay.appendChild(
          el("h3", "font-display text-sm font-semibold leading-snug", m.title)
        );
        const meta = [m.year, ...(m.genres || [])].filter(Boolean).join(" · ");
        if (meta) overlay.appendChild(el("p", "mt-1 text-[11px] text-muted", meta));
        card.appendChild(overlay);

        grid.appendChild(card);
      }
    }

    // ---------- Section 2: wishlist ----------
    function renderWishes(wishes) {
      const list = $("#wishes-list");
      list.innerHTML = "";

      if (!wishes.length) {
        showStatus(
          "#wishes-status",
          "No wishes yet. Redeem the \u201CMovie Wish\u201D item in the points store and enter your title."
        );
        return;
      }

      for (const w of wishes) {
        const card = el(
          "article",
          "flex gap-4 rounded-md border border-line bg-panel p-3 transition-colors hover:border-amber/40"
        );

        const thumb = el("div", "h-24 w-16 shrink-0 overflow-hidden rounded-sm");
        thumb.appendChild(posterOrPlaceholder(w, "h-full w-full object-cover"));
        card.appendChild(thumb);

        const info = el("div", "min-w-0 py-1");
        info.appendChild(
          el("h3", "truncate font-display text-sm font-semibold", w.title)
        );
        const meta = [w.year, ...(w.genres || [])].filter(Boolean).join(" · ");
        if (meta) info.appendChild(el("p", "mt-1 text-[11px] text-muted", meta));
        info.appendChild(
          el("p", "mt-2 text-xs text-muted", `Requested by @${w.user}`)
        );
        card.appendChild(info);

        list.appendChild(card);
      }
    }

    // ---------- Skeletons, status & loading ----------
    function renderSkeletons() {
      for (const sel of ["#watched-grid", "#watchlist-grid"]) {
        const grid = $(sel);
        for (let i = 0; i < 6; i++) {
          grid.appendChild(el("div", "skeleton aspect-[2/3] rounded-md"));
        }
      }
    }

    function showStatus(sel, msg) {
      const node = $(sel);
      node.textContent = msg;
      node.hidden = false;
    }

    async function loadJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${url} -> ${res.status}`);
      return res.json();
    }

    async function init() {
      renderSkeletons();

      const [moviesResult, watchResult] = await Promise.allSettled([
        loadJson("/api/movies"),
        loadJson("/api/watchlist"),
      ]);

      $("#watched-grid").innerHTML = "";
      $("#watchlist-grid").innerHTML = "";

      // If the API isn't reachable (e.g. static preview without serverless
      // functions), fall back to demo data and show the banner instead of errors.
      const demoMode = moviesResult.status === "rejected";
      if (demoMode) $("#demo-banner").hidden = false;

      renderMovieGrid(
        demoMode ? DEMO_MOVIES : moviesResult.value.movies || [],
        "#watched-grid",
        "#watched-count",
        "#watched-status",
        "No movies yet. Add the first one in chat with !addfilm Title.",
        "Watched on"
      );

      if (watchResult.status === "fulfilled") {
        renderMovieGrid(
          watchResult.value.watchlist || [],
          "#watchlist-grid",
          "#watchlist-count",
          "#watchlist-status",
          "The watchlist is empty. Add a movie in chat with !watch Title.",
          "Added on"
        );
      } else if (demoMode) {
        renderMovieGrid(
          DEMO_WATCHLIST,
          "#watchlist-grid",
          "#watchlist-count",
          "#watchlist-status",
          "",
          "Added on"
        );
      } else {
        // Watchlist (noch) nicht eingerichtet -> Sektion sauber ausblenden
        $("#watchlist-heading").closest("section").hidden = true;
      }
    }

    // ---------- Movie detail modal ----------
    const modal = $("#movie-modal");

    function formatRuntime(min) {
      if (!min) return null;
      const h = Math.floor(min / 60);
      const m = min % 60;
      return h ? `${h}h ${m}m` : `${m}m`;
    }

    function openModal(movie) {
      // Poster (or placeholder) on the left
      const posterBox = $("#modal-poster");
      posterBox.innerHTML = "";
      posterBox.appendChild(
        posterOrPlaceholder(movie, "h-full w-full object-cover aspect-[2/3]")
      );

      $("#modal-title").textContent = movie.title;

      const meta = [
        movie.year,
        formatRuntime(movie.runtime),
        movie.rating ? `★ ${movie.rating} / 10` : null,
      ]
        .filter(Boolean)
        .join("  ·  ");
      $("#modal-meta").textContent = meta;

      $("#modal-genres").textContent = (movie.genres || []).join(" · ");

      $("#modal-overview").textContent =
        movie.overview || "No description available.";

      const addedParts = [];
      if (movie.date) addedParts.push(`${movie._dateLabel || "Watched on"}: ${movie.date}`);
      if (movie.addedBy) addedParts.push(`added by ${movie.addedBy}`);
      $("#modal-added").textContent = addedParts.join("  ·  ");
      $("#modal-added").hidden = addedParts.length === 0;

      modal.hidden = false;
      document.body.style.overflow = "hidden"; // Hintergrund nicht scrollen
    }

    function closeModal() {
      modal.hidden = true;
      document.body.style.overflow = "";
    }

    modal.addEventListener("click", (ev) => {
      if (ev.target.closest("[data-close]")) closeModal();
    });
    document.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape" && !modal.hidden) closeModal();
    });

    init();
  </script>
</body>
</html>
